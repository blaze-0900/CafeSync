<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Employees | CafeSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Employees</h2>

<a th:href="@{/employees/add}" class="btn btn-success">
+ Add Employee
</a>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Branch</th>
<th>Designation</th>
<th>Salary</th>
<th>Joining Date</th>
<th>Status</th>
</tr>

</thead>

<tbody>

<tr th:each="employee : ${employees}">

<td th:text="${employee.employeeId}"></td>
<td th:text="${employee.user.name}"></td>
<td th:text="${employee.franchise.branchName}"></td>
<td th:text="${employee.designation}"></td>
<td th:text="${employee.salary}"></td>
<td th:text="${employee.joiningDate}"></td>
<td th:text="${employee.status}"></td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
