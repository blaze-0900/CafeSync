<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Inventory | CafeSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Inventory</h2>

<a th:href="@{/inventory/add}"
class="btn btn-success">

+ Add Inventory

</a>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Franchise</th>
<th>Ingredient</th>
<th>Available Qty</th>
<th>Minimum Qty</th>
<th>Status</th>

</tr>

</thead>

<tbody>

<tr th:each="item : ${inventory}">

<td th:text="${item.inventoryId}"></td>

<td th:text="${item.franchise.branchName}"></td>

<td th:text="${item.ingredient.ingredientName}"></td>

<td th:text="${item.availableQuantity}"></td>

<td th:text="${item.minimumQuantity}"></td>

<td th:text="${item.status}"></td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
