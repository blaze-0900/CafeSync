<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Expense</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="card shadow p-4">

<h2>Add Expense</h2>

<form th:action="@{/expenses/save}"
      th:object="${expense}"
      method="post">

<div class="mb-3">

<label>Franchise</label>

<select class="form-select" th:field="*{franchise}">

<option value="">Select Branch</option>

<option th:each="franchise : ${franchises}"
        th:value="${franchise.franchiseId}"
        th:text="${franchise.branchName}">
</option>

</select>

</div>

<div class="mb-3">

<label>Expense Type</label>

<select class="form-select" th:field="*{expenseType}">

<option value="">Select Expense Type</option>

<option th:each="type : ${expenseTypes}"
        th:value="${type}"
        th:text="${type}">
</option>

</select>

</div>

<div class="mb-3">
<label>Amount</label>
<input type="number"
step="0.01"
class="form-control"
th:field="*{amount}"
required>
</div>

<div class="mb-3">
<label>Description</label>
<textarea class="form-control"
rows="3"
th:field="*{description}"></textarea>
</div>

<div class="mb-3">
<label>Expense Date</label>
<input type="date"
class="form-control"
th:field="*{expenseDate}"
required>
</div>

<div class="mb-3">

<label>Status</label>

<select class="form-select" th:field="*{status}">

<option value="">Select Status</option>

<option th:each="status : ${statuses}"
        th:value="${status}"
        th:text="${status}">
</option>

</select>

</div>

<button class="btn btn-primary">
Save Expense
</button>

<a th:href="@{/expenses}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>

</html>
