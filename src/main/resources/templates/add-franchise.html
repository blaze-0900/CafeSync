<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Franchise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="card shadow p-4">

<h2>Add Franchise</h2>

<form th:action="@{/franchises/save}"
      th:object="${franchise}"
      method="post">

<div class="mb-3">
<label>Branch Name</label>
<input type="text" class="form-control" th:field="*{branchName}" required>
</div>

<div class="mb-3">
<label>Branch Code</label>
<input type="text" class="form-control" th:field="*{branchCode}" required>
</div>

<div class="mb-3">
<label>Address</label>
<input type="text" class="form-control" th:field="*{address}" required>
</div>

<div class="mb-3">
<label>City</label>
<input type="text" class="form-control" th:field="*{city}" required>
</div>

<div class="mb-3">
<label>State</label>
<input type="text" class="form-control" th:field="*{state}" required>
</div>

<div class="mb-3">
<label>Pincode</label>
<input type="text" class="form-control" th:field="*{pincode}" required>
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" class="form-control" th:field="*{phone}" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" th:field="*{email}" required>
</div>

<div class="mb-3">
<label>Opening Time</label>
<input type="time" class="form-control" th:field="*{openingTime}">
</div>

<div class="mb-3">
<label>Closing Time</label>
<input type="time" class="form-control" th:field="*{closingTime}">
</div>

<div class="mb-3">

<label>Owner</label>

<select class="form-select" th:field="*{owner}">

<option value="">Select Owner</option>

<option th:each="owner : ${owners}"
        th:value="${owner.userId}"
        th:text="${owner.name}">
</option>

</select>

</div>

<div class="mb-3">

<label>Status</label>

<select class="form-select" th:field="*{status}">

<option value="">Select Status</option>

<option th:each="status : ${statuses}"
        th:value="${status}"
        th:text="${status}">
</option>

</select>

</div>

<button class="btn btn-primary">
Save Franchise
</button>

<a th:href="@{/franchises}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>
</html>
