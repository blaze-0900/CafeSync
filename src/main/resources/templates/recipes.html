<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Recipes | CafeSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Recipe Management</h2>

<a th:href="@{/add-recipe}" class="btn btn-success">

+ Add Recipe

</a>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Product</th>
<th>Ingredient</th>
<th>Quantity</th>
<th>Unit</th>

</tr>

</thead>

<tbody>

<tr th:each="recipe : ${recipes}">

<td th:text="${recipe.recipeId}"></td>

<td th:text="${recipe.product.productName}"></td>

<td th:text="${recipe.ingredient.ingredientName}"></td>

<td th:text="${recipe.quantity}"></td>

<td th:text="${recipe.unit}"></td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
