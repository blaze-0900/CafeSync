<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Owner Dashboard | CafeSync</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="/css/style.css">

</head>


<body>


<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>


<!-- Sidebar -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>



<div class="content">


<h2 class="mb-4">
Welcome, Owner 👋
</h2>



<div class="row">


<div class="col-md-3">

<div class="card-box">

<h5>Total Franchise</h5>

<h2 th:text="${totalFranchise}">
0
</h2>

</div>

</div>



<div class="col-md-3">

<div class="card-box">

<h5>Total Revenue</h5>

<h2>
₹ <span th:text="${revenue}">
0
</span>
</h2>

</div>

</div>




<div class="col-md-3">

<div class="card-box">

<h5>Total Orders</h5>

<h2 th:text="${totalOrders}">
0
</h2>

</div>

</div>




<div class="col-md-3">

<div class="card-box">

<h5>Expenses</h5>

<h2>
₹ <span th:text="${expenses}">
0
</span>
</h2>

</div>

</div>


</div>



<br>


<div class="card-box">


<h4>
Inventory Alerts ⚠️
</h4>


<table class="table">

<thead>

<tr>

<th>Ingredient</th>
<th>Stock</th>
<th>Status</th>

</tr>

</thead>


<tbody>


<tr th:each="item : ${lowStockItems}">

<td th:text="${item.ingredient.name}">
Coffee Powder
</td>


<td th:text="${item.quantity}">
0
</td>


<td>

<span class="badge bg-danger">
Low Stock
</span>

</td>


</tr>


</tbody>

</table>


</div>


</div>



</body>

</html>
