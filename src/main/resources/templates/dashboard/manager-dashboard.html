<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Manager Dashboard | CafeSync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Sidebar -->
<div th:replace="~{fragments/manager-sidebar :: sidebar}"></div>

<div class="content container-fluid">

    <div class="mb-4">

        <h2>Welcome, Manager 👋</h2>

        <p class="text-muted">
            Monitor your branch operations from one place.
        </p>

    </div>

    <div class="row">

        <div class="col-md-3 mb-4">

            <div class="card shadow text-center p-4">

                <i class="fa-solid fa-user-tie fa-2x text-primary"></i>

                <h5 class="mt-3">Employees</h5>

                <h2 th:text="${employeeCount}">
                    0
                </h2>

            </div>

        </div>

       
       
        <div class="col-md-3 mb-4">

            <div class="card shadow text-center p-4">

                <i class="fa-solid fa-mug-hot fa-2x text-success"></i>

                <h5 class="mt-3">Products</h5>

                <h2 th:text="${productCount}">
                    0
                </h2>

            </div>

        </div>

        <div class="col-md-3 mb-4">

            <div class="card shadow text-center p-4">

                <i class="fa-solid fa-users fa-2x text-warning"></i>

                <h5 class="mt-3">Customers</h5>

                <h2 th:text="${customerCount}">
                    0
                </h2>

            </div>

        </div>

        <div class="col-md-3 mb-4">

            <div class="card shadow text-center p-4">

                <i class="fa-solid fa-boxes-stacked fa-2x text-danger"></i>

                <h5 class="mt-3">Inventory</h5>

                <h2 th:text="${inventoryCount}">
                    0
                </h2>

            </div>

        </div>

    </div>

    <div class="card shadow mt-4">

        <div class="card-header bg-dark text-white">

            <h4 class="mb-0">
                Quick Actions
            </h4>

        </div>

        <div class="card-body">

            <a th:href="@{/orders/add}" class="btn btn-primary m-2">
                <i class="fa-solid fa-cart-shopping"></i>
                New Order
            </a>

            <a th:href="@{/customers/add}" class="btn btn-success m-2">
                <i class="fa-solid fa-user-plus"></i>
                Add Customer
            </a>

            <a th:href="@{/inventory}" class="btn btn-warning m-2">
                <i class="fa-solid fa-boxes-stacked"></i>
                Inventory
            </a>

            <a th:href="@{/stockpurchase/add}" class="btn btn-info m-2 text-white">
                <i class="fa-solid fa-truck"></i>
                Purchase Stock
            </a>

            <a th:href="@{/notifications}" class="btn btn-secondary m-2">
                <i class="fa-solid fa-bell"></i>
                Notifications
            </a>
            <a th:href="@{/pos}" class="btn btn-danger m-2">
    <i class="fa-solid fa-cash-register"></i>
    POS Billing
</a>

        </div>

    </div>

    <div class="card shadow mt-4">

        <div class="card-header bg-primary text-white">

            <h4 class="mb-0">
                Branch Overview
            </h4>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th>Employees</th>
                    <td th:text="${employeeCount}"></td>
                </tr>

                <tr>
                    <th>Products</th>
                    <td th:text="${productCount}"></td>
                </tr>

                <tr>
                    <th>Customers</th>
                    <td th:text="${customerCount}"></td>
                </tr>

                <tr>
                    <th>Inventory Items</th>
                    <td th:text="${inventoryCount}"></td>
                </tr>

            </table>

        </div>

    </div>

</div>

</body>

</html>
