<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Manager Dashboard | CafeSync</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="/css/style.css">

</head>


<body>


<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>



<div class="content">


<h2 class="mb-4">
Welcome, Manager 👋
</h2>



<div class="row">


<div class="col-md-3">

<div class="card-box">

<h5>Today's Orders</h5>

<h2 th:text="${todayOrders}">
0
</h2>

</div>

</div>




<div class="col-md-3">

<div class="card-box">

<h5>Today's Sales</h5>

<h2>
₹ <span th:text="${todaySales}">
0
</span>
</h2>

</div>

</div>




<div class="col-md-3">

<div class="card-box">

<h5>Employees</h5>

<h2 th:text="${employeeCount}">
0
</h2>

</div>

</div>




<div class="col-md-3">

<div class="card-box">

<h5>Pending Expenses</h5>

<h2>
₹ <span th:text="${pendingExpense}">
0
</span>
</h2>

</div>

</div>


</div>



<br>


<div class="card-box">


<h4>
Low Stock Alert ⚠️
</h4>


<table class="table">


<thead>

<tr>
<th>Ingredient</th>
<th>Available</th>
<th>Status</th>
</tr>

</thead>


<tbody>


<tr th:each="stock : ${lowStock}">


<td th:text="${stock.ingredient.name}">
Milk
</td>


<td th:text="${stock.quantity}">
0
</td>


<td>

<span class="badge bg-danger">
LOW
</span>

</td>


</tr>


</tbody>


</table>


</div>



</div>


</body>

</html>
