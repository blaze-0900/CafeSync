<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Ingredients | CafeSync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Ingredients</h2>

        <a th:href="@{/ingredients/add}" class="btn btn-success">
            + Add Ingredient
        </a>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Ingredient Name</th>
            <th>Unit</th>
            <th>Status</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="ingredient : ${ingredients}">

            <td th:text="${ingredient.ingredientId}"></td>

            <td th:text="${ingredient.ingredientName}"></td>

            <td th:text="${ingredient.unit}"></td>

            <td th:text="${ingredient.status}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
