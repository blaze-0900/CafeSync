<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Expenses | CafeSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Expenses</h2>

<a th:href="@{/expenses/add}" class="btn btn-success">
+ Add Expense
</a>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Branch</th>
<th>Expense Type</th>
<th>Amount</th>
<th>Date</th>
<th>Status</th>
</tr>

</thead>

<tbody>

<tr th:each="expense : ${expenses}">

<td th:text="${expense.expenseId}"></td>
<td th:text="${expense.franchise.branchName}"></td>
<td th:text="${expense.expenseType}"></td>
<td th:text="${expense.amount}"></td>
<td th:text="${expense.expenseDate}"></td>
<td th:text="${expense.status}"></td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
