<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>CafeSync POS Billing</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Sidebar -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

    <div class="container-fluid">

        <div class="row">

            <!-- LEFT PANEL -->

            <div class="col-lg-8">

                <div class="card shadow">

                    <div class="card-header bg-dark text-white">

                        <h3>

                            <i class="fa-solid fa-cash-register"></i>

                            CafeSync POS Billing

                        </h3>

                    </div>

                    <div class="card-body">

                        <!-- CUSTOMER -->

                        <div class="row mb-4">

                            <div class="col-md-8">

                                <label class="form-label">

                                    Select Customer

                                </label>

                                <select class="form-select" name="customerId">

                                    <option value="">
                                        Walk-In Customer
                                    </option>

                                    <option
                                            th:each="customer : ${customers}"
                                            th:value="${customer.customerId}"
                                            th:text="${customer.customerName}">
                                    </option>

                                </select>

                            </div>

                        </div>

                        <hr>

                        <!-- PRODUCTS -->

                        <div class="row">

                            <div
                                    class="col-md-4 mb-4"
                                    th:each="product : ${products}">

                                <div class="card h-100 shadow-sm">

                                    <img
                                            th:src="${product.imageUrl}"
                                            class="card-img-top"
                                            style="height:170px;object-fit:cover;">

                                    <div class="card-body text-center">

                                        <h5
                                                th:text="${product.productName}">
                                        </h5>

                                        <p class="text-muted"
                                           th:text="${product.description}">
                                        </p>

                                        <h5 class="text-success">

                                            ₹
                                            <span
                                                    th:text="${product.price}">
                                            </span>

                                        </h5>

                                        <form
                                                th:action="@{/pos/add}"
                                                method="post">

                                            <input
                                                    type="hidden"
                                                    name="productId"
                                                    th:value="${product.productId}">

                                            <label class="form-label mt-2">

                                                Quantity

                                            </label>

                                            <input
                                                    type="number"
                                                    class="form-control mb-3"
                                                    name="quantity"
                                                    value="1"
                                                    min="1">

                                            <button
                                                    type="submit"
                                                    class="btn btn-primary w-100">

                                                <i class="fa-solid fa-cart-plus"></i>

                                                Add To Bill

                                            </button>

                                        </form>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- RIGHT PANEL STARTS HERE -->
            <div class="col-lg-4">

                <div class="card shadow">

                    <div class="card-header bg-success text-white">

                        <h4>

                            <i class="fa-solid fa-receipt"></i>

                            Current Bill

                        </h4>

                    </div>

                    <div class="card-body">

                        <table class="table table-bordered table-hover">

                            <thead class="table-light">

                            <tr>

                                <th>Product</th>
<th>Qty</th>
<th>Total</th>
<th>Action</th>

                            </tr>

                            </thead>

                            <tbody>

                            <tr th:if="${#lists.isEmpty(bill)}">

                                <td colspan="3" class="text-center text-muted">

                                    No products added

                                </td>

                            </tr>

                            <tr th:each="item : ${bill}">

                                <td th:text="${item.productName}"></td>

                                <td th:text="${item.quantity}"></td>

                                <td>

                                    ₹ <span th:text="${item.total}"></span>

                                </td>
                                 <td>

<a th:href="@{/pos/remove/{id}(id=${item.productId})}"
   class="btn btn-danger btn-sm">

<i class="fa-solid fa-trash"></i>

</a>

</td>
                                

                            </tr>

                            </tbody>

                        </table>

                        <hr>

                        <div class="d-flex justify-content-between">

                            <h5>Grand Total</h5>
                            

                            <h4 class="text-success">

                                ₹ <span th:text="${grandTotal}">0</span>

                            </h4>

                        </div>
                        <a th:href="@{/pos/clear}"
   class="btn btn-outline-danger w-100 mb-3">

<i class="fa-solid fa-trash"></i>
Clear Bill

</a>

                        <hr>
                       
                        <form th:action="@{/pos/place-order}" method="post">

					<input type="hidden" name="customerId" value="0">
                            <label class="form-label">

                                Payment Method

                            </label>

                            <select
                                    class="form-select mb-3"
                                    name="paymentMethod">

                                <option value="CASH">

                                    Cash

                                </option>

                                <option value="CARD">

                                    Card

                                </option>

                                <option value="UPI">

                                    UPI

                                </option>

                            </select>
<button
                                    type="submit"
                                    class="btn btn-success w-100">

                                <i class="fa-solid fa-check"></i>

                                Place Order

                            </button>

                            
                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
