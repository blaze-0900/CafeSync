<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Inventory</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="card p-4 shadow">

<h2>Add Inventory</h2>

<form th:action="@{/inventory/save}"
      th:object="${inventory}"
      method="post">

<div class="mb-3">

<label>Franchise</label>

<select class="form-select"
th:field="*{franchise}">

<option value="">Select Franchise</option>

<option th:each="franchise : ${franchises}"
        th:value="${franchise.franchiseId}"
        th:text="${franchise.branchName}">
</option>

</select>

</div>


<div class="mb-3">

<label>Ingredient</label>

<select class="form-select"
th:field="*{ingredient}">

<option value="">Select Ingredient</option>

<option th:each="ingredient : ${ingredients}"
        th:value="${ingredient.ingredientId}"
        th:text="${ingredient.ingredientName}">
</option>

</select>

</div>


<div class="mb-3">

<label>Available Quantity</label>

<input type="number"
step="0.01"
class="form-control"
th:field="*{availableQuantity}"
required>

</div>


<div class="mb-3">

<label>Minimum Quantity</label>

<input type="number"
step="0.01"
class="form-control"
th:field="*{minimumQuantity}"
required>

</div>


<div class="mb-3">

<label>Status</label>

<select class="form-select"
th:field="*{status}">

<option th:each="status : ${statuses}"
        th:value="${status}"
        th:text="${status}">
</option>

</select>

</div>


<button class="btn btn-primary">

Save Inventory

</button>

<a th:href="@{/inventory}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</body>

</html>
