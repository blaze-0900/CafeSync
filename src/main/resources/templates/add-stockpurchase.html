<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Stock Purchase</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="card shadow p-4">

<h2>Add Stock Purchase</h2>

<form th:action="@{/stockpurchase/save}"
      th:object="${stockPurchase}"
      method="post">

<div class="mb-3">

<label>Supplier</label>

<select class="form-select" th:field="*{supplier}">
<option value="">Select Supplier</option>

<option th:each="supplier : ${suppliers}"
        th:value="${supplier.supplierId}"
        th:text="${supplier.supplierName}">
</option>

</select>

</div>

<div class="mb-3">

<label>Franchise</label>

<select class="form-select" th:field="*{franchise}">
<option value="">Select Franchise</option>

<option th:each="franchise : ${franchises}"
        th:value="${franchise.franchiseId}"
        th:text="${franchise.branchName}">
</option>

</select>

</div>

<div class="mb-3">

<label>Ingredient</label>

<select class="form-select" th:field="*{ingredient}">
<option value="">Select Ingredient</option>

<option th:each="ingredient : ${ingredients}"
        th:value="${ingredient.ingredientId}"
        th:text="${ingredient.ingredientName}">
</option>

</select>

</div>

<div class="mb-3">
<label>Quantity</label>
<input type="number" step="0.01" class="form-control"
th:field="*{quantity}" required>
</div>

<div class="mb-3">
<label>Price Per Unit</label>
<input type="number" step="0.01" class="form-control"
th:field="*{pricePerUnit}" required>
</div>

<div class="mb-3">
<label>Total Amount</label>
<input type="number" step="0.01" class="form-control"
th:field="*{totalAmount}" required>
</div>

<div class="mb-3">
<label>Purchase Date</label>
<input type="date" class="form-control"
th:field="*{purchaseDate}" required>
</div>

<div class="mb-3">

<label>Status</label>

<select class="form-select" th:field="*{status}">

<option th:each="status : ${statuses}"
        th:value="${status}"
        th:text="${status}">
</option>

</select>

</div>

<button class="btn btn-primary">
Save Purchase
</button>

<a th:href="@{/stockpurchase}"
class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>

</html>
