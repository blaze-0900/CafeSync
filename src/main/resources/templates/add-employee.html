<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Employee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="card shadow p-4">

<h2>Add Employee</h2>

<form th:action="@{/employees/save}"
      th:object="${employee}"
      method="post">

<div class="mb-3">

<label>User</label>

<select class="form-select" th:field="*{user}">

<option value="">Select User</option>

<option th:each="user : ${users}"
        th:value="${user.userId}"
        th:text="${user.name}">
</option>

</select>

</div>

<div class="mb-3">

<label>Franchise</label>

<select class="form-select" th:field="*{franchise}">

<option value="">Select Branch</option>

<option th:each="franchise : ${franchises}"
        th:value="${franchise.franchiseId}"
        th:text="${franchise.branchName}">
</option>

</select>

</div>

<div class="mb-3">
<label>Designation</label>
<input type="text"
class="form-control"
th:field="*{designation}"
required>
</div>

<div class="mb-3">
<label>Salary</label>
<input type="number"
step="0.01"
class="form-control"
th:field="*{salary}"
required>
</div>

<div class="mb-3">
<label>Joining Date</label>
<input type="date"
class="form-control"
th:field="*{joiningDate}"
required>
</div>

<div class="mb-3">

<label>Status</label>

<select class="form-select" th:field="*{status}">

<option value="">Select Status</option>

<option th:each="status : ${statuses}"
        th:value="${status}"
        th:text="${status}">
</option>

</select>

</div>

<button class="btn btn-primary">
Save Employee
</button>

<a th:href="@{/employees}"
class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>

</html>
