<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add User</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="card shadow p-4">

<h2>Add User</h2>

<form th:action="@{/users/save}"
      th:object="${user}"
      method="post">

<div class="mb-3">

<label>Name</label>

<input type="text"
class="form-control"
th:field="*{name}"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input type="email"
class="form-control"
th:field="*{email}"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input type="password"
class="form-control"
th:field="*{password}"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input type="text"
class="form-control"
th:field="*{phone}"
required>

</div>

<div class="mb-3">

<label>Role</label>

<select class="form-select"
th:field="*{role}">

<option value="">Select Role</option>

<option th:each="role : ${roles}"
        th:value="${role}"
        th:text="${role}">
</option>

</select>

</div>

<div class="mb-3">

<label>Status</label>

<select class="form-select"
th:field="*{status}">

<option value="">Select Status</option>

<option th:each="status : ${statuses}"
        th:value="${status}"
        th:text="${status}">
</option>

</select>

</div>
<div class="mb-3">

<label>Role Password</label>

<input type="password"
       class="form-control"
       th:field="*{rolePassword}"
       required>

</div>

<button class="btn btn-primary">

Save User

</button>

<a th:href="@{/users}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</body>

</html>
