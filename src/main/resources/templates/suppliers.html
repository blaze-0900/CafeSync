<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Suppliers | CafeSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Suppliers</h2>

<a th:href="@{/suppliers/add}" class="btn btn-success">
+ Add Supplier
</a>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Supplier Name</th>
<th>Contact Person</th>
<th>Phone</th>
<th>Email</th>
<th>Address</th>
<th>Status</th>

</tr>

</thead>

<tbody>

<tr th:each="supplier : ${suppliers}">

<td th:text="${supplier.supplierId}"></td>

<td th:text="${supplier.supplierName}"></td>

<td th:text="${supplier.contactPerson}"></td>

<td th:text="${supplier.phone}"></td>

<td th:text="${supplier.email}"></td>

<td th:text="${supplier.address}"></td>

<td th:text="${supplier.status}"></td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
