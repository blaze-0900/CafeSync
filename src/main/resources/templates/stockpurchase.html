<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Stock Purchase | CafeSync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Stock Purchases</h2>

<a th:href="@{/stockpurchase/add}" class="btn btn-success">
+ Add Purchase
</a>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Supplier</th>
<th>Franchise</th>
<th>Ingredient</th>
<th>Quantity</th>
<th>Price/Unit</th>
<th>Total</th>
<th>Date</th>
<th>Status</th>
</tr>

</thead>

<tbody>

<tr th:each="purchase : ${stockPurchases}">

<td th:text="${purchase.purchaseId}"></td>
<td th:text="${purchase.supplier.supplierName}"></td>
<td th:text="${purchase.franchise.branchName}"></td>
<td th:text="${purchase.ingredient.ingredientName}"></td>
<td th:text="${purchase.quantity}"></td>
<td th:text="${purchase.pricePerUnit}"></td>
<td th:text="${purchase.totalAmount}"></td>
<td th:text="${purchase.purchaseDate}"></td>
<td th:text="${purchase.status}"></td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
