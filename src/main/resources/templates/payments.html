<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Payments | CafeSync</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Payments</h2>

<a th:href="@{/payments/add}" class="btn btn-success">
+ Add Payment
</a>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Order ID</th>
<th>Amount</th>
<th>Method</th>
<th>Status</th>
<th>Payment Date</th>
</tr>

</thead>

<tbody>

<tr th:each="payment : ${payments}">

<td th:text="${payment.paymentId}"></td>
<td th:text="${payment.order.orderId}"></td>
<td th:text="${payment.amount}"></td>
<td th:text="${payment.paymentMethod}"></td>
<td th:text="${payment.paymentStatus}"></td>
<td th:text="${payment.paymentDate}"></td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
