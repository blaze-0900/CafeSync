<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Notification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="card shadow p-4">

<h2>Add Notification</h2>

<form th:action="@{/notifications/save}"
      th:object="${notification}"
      method="post">

<div class="mb-3">

<label>Franchise</label>

<select class="form-select" th:field="*{franchise}" required>

<option value="">Select Branch</option>

<option th:each="franchise : ${franchises}"
        th:value="${franchise.franchiseId}"
        th:text="${franchise.branchName}">
</option>

</select>

</div>

<div class="mb-3">
<label>Title</label>
<input type="text"
class="form-control"
th:field="*{title}"
required>
</div>

<div class="mb-3">
<label>Message</label>
<textarea class="form-control"
rows="4"
th:field="*{message}"></textarea>
</div>

<div class="mb-3">
<label>Read Status</label>

<select class="form-select"
th:field="*{isRead}">

<option th:value="false">Unread</option>
<option th:value="true">Read</option>

</select>

</div>

<div class="mb-3">
<label>Created At</label>

<input type="datetime-local"
class="form-control"
th:field="*{createdAt}">
</div>

<button class="btn btn-primary">
Save Notification
</button>

<a th:href="@{/notifications}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>

</html>
