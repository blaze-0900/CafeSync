<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="sidebar">

<div class="sidebar">

<div class="text-center mt-3">

<img th:src="@{/images/logo.jpeg}"
     class="sidebar-logo"
     alt="CafeSync Logo">

</div>




<!-- Dashboard (Already Correct) -->

<a th:if="${user != null && user.role.name() == 'OWNER'}"
   th:href="@{/owner-dashboard}">
    <i class="fa-solid fa-house"></i> Dashboard
</a>

<a th:if="${user != null && user.role.name() == 'MANAGER'}"
   th:href="@{/manager-dashboard}">
    <i class="fa-solid fa-house"></i> Dashboard
</a>

<a th:if="${user != null && user.role.name() == 'ADMIN'}"
   th:href="@{/admin-dashboard}">
    <i class="fa-solid fa-house"></i> Dashboard
</a>

<a th:if="${user != null && user.role.name() == 'EMPLOYEE'}"
   th:href="@{/employee-dashboard}">
    <i class="fa-solid fa-house"></i> Dashboard
</a>


<!-- Owner & Admin -->

<a th:if="${user.role.name() == 'OWNER' || user.role.name() == 'ADMIN'}"
   href="/franchises">
    Franchises
</a>


<!-- Owner, Manager & Admin -->

<a th:if="${user.role.name() == 'OWNER' || user.role.name() == 'MANAGER' || user.role.name() == 'ADMIN'}"
   href="/employees">
    Employees
</a>


<!-- Everyone -->

<a href="/products">
    Products
</a>

<a href="/inventory">
    Inventory
</a>

<a href="/orders">
    Orders
</a>

<a href="/customers">
    Customers
</a>


<!-- Owner & Manager -->

<a th:if="${user.role.name() == 'OWNER' || user.role.name() == 'MANAGER'}"
   href="/expenses">
    Expenses
</a>


<!-- Manager & Employee -->

<a th:if="${user.role.name() == 'MANAGER' || user.role.name() == 'EMPLOYEE'}"
   href="/pos">
    POS Billing
</a>


<!-- Everyone -->

<a href="/notifications">
    Notifications
</a>

<a href="/login">
    Logout
</a>

</div>

</div>

</html>
