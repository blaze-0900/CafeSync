<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Recipe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

<div class="card p-4 shadow">

<h2>Add Recipe</h2>

<form th:action="@{/recipes/save}"
      th:object="${recipe}"
      method="post">

<div class="mb-3">

<label>Product</label>

<select class="form-select" th:field="*{product}">

<option value="">Select Product</option>

<option th:each="product : ${products}"
        th:value="${product.productId}"
        th:text="${product.productName}">
</option>

</select>

</div>


<div class="mb-3">

<label>Ingredient</label>

<select class="form-select" th:field="*{ingredient}">

<option value="">Select Ingredient</option>

<option th:each="ingredient : ${ingredients}"
        th:value="${ingredient.ingredientId}"
        th:text="${ingredient.ingredientName}">
</option>

</select>

</div>


<div class="mb-3">

<label>Quantity</label>

<input type="number"
step="0.01"
class="form-control"
th:field="*{quantity}"
required>

</div>


<div class="mb-3">

<label>Unit</label>

<input type="text"
class="form-control"
th:field="*{unit}"
required>

</div>

<button class="btn btn-primary">

Save Recipe

</button>

<a th:href="@{/recipes}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</body>

</html>
