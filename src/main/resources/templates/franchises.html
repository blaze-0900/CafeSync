<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Franchises | CafeSync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Franchises</h2>

        <a th:href="@{/franchises/add}" class="btn btn-success">
            + Add Franchise
        </a>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Branch</th>
            <th>Code</th>
            <th>City</th>
            <th>Phone</th>
            <th>Owner</th>
            <th>Status</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="franchise : ${franchises}">

            <td th:text="${franchise.franchiseId}"></td>
            <td th:text="${franchise.branchName}"></td>
            <td th:text="${franchise.branchCode}"></td>
            <td th:text="${franchise.city}"></td>
            <td th:text="${franchise.phone}"></td>
            <td th:text="${franchise.owner.name}"></td>
            <td th:text="${franchise.status}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
